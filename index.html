<style>
  .showreel-container {
    position: relative;
    width: 90%;
    max-width: 1150px;
    margin: 0 auto;
    aspect-ratio: 16 / 9;
    background: #000;
    cursor: pointer;
  }

  .showreel-container img {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .showreel-container iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }

  .showreel-play {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    z-index: 2;
    transition: background 0.2s, transform 0.2s;
    pointer-events: none;
  }

  .showreel-container:hover .showreel-play {
    background: rgba(255,255,255,0.28);
    transform: translate(-50%, -50%) scale(1.08);
  }

  .showreel-play svg {
    width: 26px;
    height: 26px;
    margin-left: 5px;
  }

  #showreel {
    padding: 9rem 0 5rem;
    min-height: auto;
    display: flex;
    align-items: center;
    justify-content: center;
  }
</style>

<main>
<section id="showreel">
  <div class="showreel-container" id="player" onclick="playVideo(this)">
    <img src="thumbnail.png" alt="Showreel 2026" id="thumb">
    <div class="showreel-play" id="playBtn">
      <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6,3 20,12 6,21"/></svg>
    </div>
  </div>
</section>

<script>
function playVideo(container) {
  document.getElementById('thumb').remove();
  document.getElementById('playBtn').remove();
  container.style.cursor = 'default';
  var iframe = document.createElement('iframe');
  iframe.src = 'https://player.vimeo.com/video/1197396699?autoplay=1&title=0&byline=0&portrait=0&badge=0&dnt=1';
  iframe.allow = 'autoplay; fullscreen; picture-in-picture';
  iframe.allowFullscreen = true;
  container.appendChild(iframe);
  container.onclick = null;
}
</script>
